<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypScale Pro — Any Google Font + Type Scale Generator</title>
  <meta name="description" content="Search any Google Font, generate accessible type scales, and get production-ready CSS." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { 
      overflow: hidden; 
      background-color: #020C28; 
      color: #F8F9FA;
      font-family: system-ui, -apple-system, sans-serif;
    }
    input, select { appearance: none; -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #060f26; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #36069A; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #4ADEDE; cursor: pointer; }
    
    .font-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #1E2D50;
      background: #0a1940;
      color: #F8F9FA;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }
    .font-input:focus {
      border-color: #4ADEDE;
      box-shadow: 0 0 0 2px rgba(74, 222, 222, 0.1);
    }
    @media (max-width: 768px) {
      #sidebar { display: none !important; }
      #mobile-toggle { display: block !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ─── Constants & Data ─────────────────────────────── */

const RATIOS = {
  "Minor Second": 1.067,
  "Major Second": 1.125,
  "Minor Third": 1.200,
  "Major Third": 1.250,
  "Perfect Fourth": 1.333,
  "Augmented Fourth": 1.414,
  "Perfect Fifth": 1.500,
  "Golden Ratio": 1.618
};

const MOBILE_DOWNGRADE = {
  "Minor Second": "Minor Second",
  "Major Second": "Minor Second",
  "Minor Third": "Major Second",
  "Major Third": "Minor Third",
  "Perfect Fourth": "Minor Third",
  "Augmented Fourth": "Major Third",
  "Perfect Fifth": "Perfect Fourth",
  "Golden Ratio": "Perfect Fourth"
};

// Comprehensive fallback list of highly utilized/accessible Google Fonts
const INITIAL_FONTS = [
  "Atkinson Hyperlegible", "Inter", "Roboto", "Open Sans", "Lato", "Montserrat", 
  "Playfair Display", "Poppins", "Source Sans 3", "Roboto Mono", "Oswald", 
  "Raleway", "Merriweather", "Noto Sans", "Ubuntu", "Lora", "Mukta", "Nunito", 
  "PT Sans", "Work Sans", "DM Sans", "Figtree", "Plus Jakarta Sans", 
  "Space Grotesk", "Fraunces", "Syne", "Manrope", "Outfit", "Lexend", "Kanit", 
  "Heebo", "IBM Plex Sans", "Lexend Deca", "Public Sans", "Be Vietnam Pro",
  "Arvo", "Bitter", "Crimson Text", "Fira Sans", "Inconsolata", "Karla", "Libre Baskerville",
  "Libre Franklin", "Muli", "Nanum Gothic", "Oxygen", "PT Serif", "Quicksand", "Spectral",
  "Tinos", "Varela Round", "Zilla Slab", "Bricolage Grotesque", "Instrument Sans", "Schibsted Grotesk"
];

const PRESETS = [
  { h: "Playfair Display", b: "Source Sans 3", label: "Classic Editorial" },
  { h: "Atkinson Hyperlegible", b: "Atkinson Hyperlegible", label: "A11y Focused" },
  { h: "Space Grotesk", b: "Inter", label: "Tech Minimal" },
  { h: "Fraunces", b: "Work Sans", label: "Soft & Modern" },
  { h: "Syne", b: "Figtree", label: "Expressive Brand" },
  { h: "Outfit", b: "DM Sans", label: "Clean UI" }
];

const TYPE_LEVELS = [
  { name: "Display", label: "display", steps: 5, isHeading: true, weight: 800 },
  { name: "H1", label: "h1", steps: 4, isHeading: true, weight: 700 },
  { name: "H2", label: "h2", steps: 3, isHeading: true, weight: 700 },
  { name: "H3", label: "h3", steps: 2, isHeading: true, weight: 600 },
  { name: "H4", label: "h4", steps: 1, isHeading: true, weight: 600 },
  { name: "Body Large", label: "body-lg", steps: 0.5, isHeading: false, weight: 400 },
  { name: "Body", label: "body", steps: 0, isHeading: false, weight: 400 },
  { name: "Small", label: "small", steps: -1, isHeading: false, weight: 400 },
  { name: "Caption", label: "caption", steps: -2, isHeading: false, weight: 400 },
];

const P = {
  purple: "#36069A", pink: "#DE6399", navy: "#020C28", cyan: "#4ADEDE",
  white: "#FFFFFF", offWhite: "#F8F9FA", dark: "#212529",
  mid: "#6C757D", light: "#ADB5BD",
};

/* ─── Components ───────────────────────────────────── */

const Badge = ({ text, color, bg }) => (
  <span style={{
    fontSize: "0.56rem", padding: "2px 6px", borderRadius: "3px",
    background: bg || `${color}1A`, color,
    border: `1px solid ${color}33`,
    fontWeight: 700, fontFamily: "monospace", letterSpacing: "0.04em",
    whiteSpace: "nowrap",
  }}>{text}</span>
);

const SideLabel = ({ children }) => (
  <div style={{
    fontSize: "0.56rem", fontWeight: 800, color: P.cyan,
    textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "6px",
  }}>{children}</div>
);

const Divider = () => (
  <div style={{ height: "1px", background: "#1a2a4a", margin: "14px 0" }} />
);

const PresetBtn = ({ value, current, onClick, label }) => (
  <button onClick={onClick} style={{
    padding: "4px 9px", borderRadius: "4px", cursor: "pointer",
    border: `1px solid ${current === value ? P.cyan : "#1E2D50"}`,
    background: current === value ? P.cyan : "transparent",
    color: current === value ? P.navy : P.light,
    fontSize: "0.67rem", fontWeight: current === value ? 700 : 400,
    transition: "all 0.2s"
  }}>{label || value}</button>
);

/* ─── Main App ─────────────────────────────────────── */

function TypScale() {
  const [headingFont, setHeadingFont] = useState("Playfair Display");
  const [bodyFont, setBodyFont] = useState("Source Sans 3");
  const [ratio, setRatio] = useState("Perfect Fourth");
  const [baseSize, setBaseSize] = useState(16);
  const [lineHeight, setLineHeight] = useState("normal");
  const [customLH, setCustomLH] = useState(1.5);
  const [letterSpacing, setLetterSpacing] = useState("normal");
  const [customLS, setCustomLS] = useState(0);
  const [device, setDevice] = useState("desktop");
  const [tab, setTab] = useState("scale");
  const [fluid, setFluid] = useState(false);
  const [loading, setLoading] = useState(false);
  const [darkMode, setDarkMode] = useState(false);
  const [copied, setCopied] = useState(false);
  const [allFonts, setAllFonts] = useState(INITIAL_FONTS);

  /* Fetch Full Google Font List for datalist discovery */
  useEffect(() => {
    // Attempting to fetch a comprehensive font list from a public registry
    // This allows discovery of "all" fonts without API key overhead
    const fetchFontList = async () => {
      try {
        const response = await fetch("https://raw.githubusercontent.com/jonathantneal/google-fonts/master/google-fonts.json");
        if (response.ok) {
          const data = await response.json();
          const families = Object.keys(data).sort();
          if (families.length > 0) setAllFonts(families);
        }
      } catch (e) {
        console.warn("Could not fetch full font list, using fallback.", e);
      }
    };
    fetchFontList();
  }, []);

  /* Dynamic Font Loader */
  useEffect(() => {
    if (!headingFont || !bodyFont) return;
    setLoading(true);
    const h = headingFont.trim().replace(/ /g, "+");
    const b = bodyFont.trim().replace(/ /g, "+");
    
    // Requesting expanded weights for better fidelity (400, 500, 700, 800)
    const url = `https://fonts.googleapis.com/css2?family=${h}:ital,wght@0,400;0,700;0,800;1,400&family=${b}:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap`;
    
    const linkId = "dynamic-google-fonts";
    let link = document.getElementById(linkId);
    
    if (!link) {
      link = document.createElement("link");
      link.id = linkId;
      link.rel = "stylesheet";
      document.head.appendChild(link);
    }
    
    link.href = url;
    
    // Check if fonts actually loaded by checking the Document.fonts API
    const checkFonts = async () => {
      try {
        await document.fonts.ready;
        setLoading(false);
      } catch (e) {
        setLoading(false);
      }
    };
    checkFonts();

  }, [headingFont, bodyFont]);

  /* Scale Calculations */
  const effectiveRatio = device === "mobile" ? MOBILE_DOWNGRADE[ratio] : ratio;
  const effectiveBase = device === "mobile" ? Math.max(14, baseSize - 2) : baseSize;
  const r = RATIOS[effectiveRatio];
  const desktopR = RATIOS[ratio];
  const mobileR = RATIOS[MOBILE_DOWNGRADE[ratio]];

  const scale = (steps) => effectiveBase * Math.pow(r, steps);
  const desktopScale = (steps) => baseSize * Math.pow(desktopR, steps);
  const mobileScale = (steps) => Math.max(11, (baseSize - 2) * Math.pow(mobileR, steps));

  const lh = lineHeight === "custom" ? customLH : (lineHeight === "tight" ? 1.2 : lineHeight === "relaxed" ? 1.75 : 1.5);
  const ls = letterSpacing === "custom" ? `${customLS}em` : (letterSpacing === "tight" ? "-0.02em" : letterSpacing === "loose" ? "0.05em" : "0em");

  const bg = darkMode ? "#111827" : P.white;
  const textColor = darkMode ? "#F9FAFB" : P.dark;
  const subColor = darkMode ? "#9CA3AF" : P.mid;

  const generateCSS = useCallback(() => {
    const dr = RATIOS[ratio];
    const hFormatted = headingFont.trim().replace(/ /g, "+");
    const bFormatted = bodyFont.trim().replace(/ /g, "+");
    
    let out = `/* TypScale Pro Generated CSS */\n/* Ratio: ${ratio} (${dr}) */\n\n`;
    out += `@import url('https://fonts.googleapis.com/css2?family=${hFormatted}:wght@400;700&family=${bFormatted}:wght@400;500;700&display=swap');\n\n`;
    out += `:root {\n  --font-heading: '${headingFont}', serif;\n  --font-body: '${bodyFont}', sans-serif;\n  --text-base: ${baseSize}px;\n  --lh-body: ${lh};\n  --ls-body: ${ls};\n\n`;
    
    TYPE_LEVELS.forEach(l => {
      const ds = desktopScale(l.steps);
      const ms = mobileScale(l.steps);
      if (fluid && l.steps > 0) {
        const slope = (ds - ms) / (1440 - 375);
        const intercept = ms - slope * 375;
        out += `  --text-${l.label}: clamp(${ms.toFixed(2)}px, ${(slope * 100).toFixed(4)}vw + ${intercept.toFixed(2)}px, ${ds.toFixed(2)}px);\n`;
      } else {
        out += `  --text-${l.label}: ${ds.toFixed(2)}px;\n`;
      }
    });
    out += `}\n\nbody {\n  font-family: var(--font-body);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  letter-spacing: var(--ls-body);\n  color: #212529;\n}\n\nh1, h2, h3, h4 { font-family: var(--font-heading); line-height: 1.1; }`;
    return out;
  }, [ratio, headingFont, bodyFont, baseSize, lh, ls, fluid]);

  const copyCSS = async () => {
    try {
      await navigator.clipboard.writeText(generateCSS());
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (_) {}
  };

  /* ── Sidebar Component ── */
  const Sidebar = () => (
    <aside id="sidebar" style={{
      width: "280px", flexShrink: 0, background: "#060f26", overflowY: "auto",
      padding: "20px", borderRight: "1px solid #1a2a4a", display: "flex", flexDirection: "column"
    }}>
      <datalist id="all-google-fonts">
        {allFonts.map(f => <option key={f} value={f} />)}
      </datalist>

      <SideLabel>Heading Font</SideLabel>
      <input 
        type="text" 
        list="all-google-fonts" 
        className="font-input"
        value={headingFont} 
        onChange={e => setHeadingFont(e.target.value)}
        placeholder="Type any Google Font..."
        style={{ marginBottom: "6px" }}
      />
      <div style={{ fontSize: "0.55rem", color: P.light, marginBottom: "12px", fontStyle: "italic" }}>
        Discovery enabled for {allFonts.length} families.
      </div>

      <SideLabel>Body Font</SideLabel>
      <input 
        type="text" 
        list="all-google-fonts" 
        className="font-input"
        value={bodyFont} 
        onChange={e => setBodyFont(e.target.value)}
        placeholder="Type any Google Font..."
      />
      <div style={{ fontSize: "0.55rem", color: P.light, marginTop: "6px", lineHeight: 1.4 }}>
        Enter any valid Google Font name (e.g. <strong>Bricolage Grotesque</strong>).
      </div>

      <div style={{ marginTop: "12px", display: "flex", gap: "6px", flexWrap: "wrap" }}>
        <div style={{ fontSize: "0.58rem", color: P.light, width: "100%", marginBottom: "4px" }}>Design Lady Presets:</div>
        {PRESETS.map(p => (
          <button key={p.label} onClick={() => { setHeadingFont(p.h); setBodyFont(p.b); }} style={{
            fontSize: "0.6rem", padding: "4px 8px", borderRadius: "4px", background: "#1a2a4a",
            color: P.cyan, border: "none", cursor: "pointer"
          }}>{p.label}</button>
        ))}
      </div>

      <Divider />

      <SideLabel>Scale Ratio</SideLabel>
      <select value={ratio} onChange={e => setRatio(e.target.value)} style={{
        width: "100%", padding: "8px", borderRadius: "6px", border: "1px solid #1E2D50",
        background: "#0a1940", color: P.offWhite, fontSize: "0.8rem", outline: "none"
      }}>
        {Object.entries(RATIOS).map(([name, val]) => (
          <option key={name} value={name}>{name} ({val})</option>
        ))}
      </select>

      <Divider />

      <SideLabel>Base Size: {effectiveBase}px</SideLabel>
      <input type="range" min="14" max="24" value={baseSize} onChange={e => setBaseSize(Number(e.target.value))} style={{ width: "100%", accentColor: P.cyan }} />
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.6rem", color: P.light, marginTop: "4px" }}>
        <span>14px</span>
        <span>24px</span>
      </div>

      <Divider />

      <SideLabel>Line Height · {lh}</SideLabel>
      <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
        {["tight", "normal", "relaxed", "custom"].map(o => (
          <PresetBtn key={o} value={o} current={lineHeight} onClick={() => setLineHeight(o)} />
        ))}
      </div>
      {lineHeight === "custom" && (
        <input type="number" step="0.1" value={customLH} onChange={e => setCustomLH(Number(e.target.value))} className="font-input" style={{ marginTop: "8px" }} />
      )}

      <Divider />

      <label style={{ display: "flex", alignItems: "center", gap: "10px", cursor: "pointer" }}>
        <input type="checkbox" checked={fluid} onChange={e => setFluid(e.target.checked)} style={{ accentColor: P.cyan }} />
        <span style={{ fontSize: "0.75rem", fontWeight: 600 }}>Enable Fluid Typography</span>
      </label>

      <div style={{ flex: 1 }} />
      
      <a href={`mailto:jodonnell@bgbgroup.com?subject=A11y Sign-Off — ${headingFont} / ${bodyFont}`} style={{
        display: "block", padding: "10px", borderRadius: "8px", background: P.purple,
        color: P.white, textAlign: "center", textDecoration: "none", fontSize: "0.75rem", fontWeight: 700
      }}>Request A11y Sign-Off</a>
    </aside>
  );

  /* ── Tab Views ── */
  const ScaleTab = () => (
    <div style={{ padding: "32px", maxWidth: device === "mobile" ? "375px" : "1000px", margin: "0 auto" }}>
      {TYPE_LEVELS.map(level => {
        const size = scale(level.steps);
        const family = level.isHeading ? `'${headingFont}', serif` : `'${bodyFont}', sans-serif`;
        return (
          <div key={level.name} style={{ marginBottom: "24px", borderBottom: `1px solid ${darkMode ? "#1F2937" : "#E5E7EB"}`, paddingBottom: "16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.65rem", color: subColor, marginBottom: "8px", fontFamily: "monospace" }}>
              <span>{level.name} ({level.steps} steps)</span>
              <span>{size.toFixed(2)}px · {(size/16).toFixed(3)}rem</span>
            </div>
            <div style={{
              fontFamily: family,
              fontSize: `${size}px`,
              lineHeight: level.isHeading ? 1.1 : lh,
              letterSpacing: level.isHeading ? "-0.01em" : ls,
              fontWeight: level.weight,
              color: textColor
            }}>
              {level.isHeading ? "The quick brown fox" : "The quick brown fox jumps over the lazy dog. Typography is the craft of endowing human language with a durable visual form."}
            </div>
          </div>
        );
      })}
    </div>
  );

  const CSSTab = () => (
    <div style={{ padding: "32px", maxWidth: "900px", margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
        <h3 style={{ color: P.purple }}>Production CSS</h3>
        <button onClick={copyCSS} style={{
          padding: "8px 16px", borderRadius: "6px", background: copied ? "#22C55E" : P.purple,
          color: P.white, border: "none", cursor: "pointer", fontWeight: 600
        }}>{copied ? "Copied!" : "Copy to Clipboard"}</button>
      </div>
      <pre style={{
        background: P.navy, color: P.cyan, padding: "20px", borderRadius: "10px",
        overflow: "auto", fontSize: "0.75rem", lineHeight: 1.6, border: "1px solid #1a2a4a"
      }}>{generateCSS()}</pre>
    </div>
  );

  const ArticleTab = () => (
    <div style={{ 
      maxWidth: device === "mobile" ? "375px" : "700px", 
      margin: "0 auto", padding: "40px 20px",
      color: textColor
    }}>
      <h1 style={{ fontFamily: `'${headingFont}', serif`, fontSize: `${scale(4)}px`, marginBottom: "16px", fontWeight: 800 }}>
        The Future of Fluid Typography
      </h1>
      <p style={{ fontFamily: `'${bodyFont}', sans-serif`, fontSize: `${scale(0.5)}px`, color: subColor, marginBottom: "32px" }}>
        Exploring how dynamic ratios and variable fonts transform design systems.
      </p>
      <div style={{ fontFamily: `'${bodyFont}', sans-serif`, fontSize: `${scale(0)}px`, lineHeight: lh, letterSpacing: ls }}>
        <p style={{ marginBottom: "20px" }}>
          Typography isn't just about picking a font; it's about establishing a <strong>visual rhythm</strong>. Using a ratio of {RATIOS[ratio]} ({ratio}), we've created a hierarchy that feels {RATIOS[ratio] > 1.3 ? "bold and cinematic" : "balanced and professional"}.
        </p>
        <h2 style={{ fontFamily: `'${headingFont}', serif`, fontSize: `${scale(2)}px`, marginBottom: "16px", marginTop: "40px" }}>
          The Power of {ratio}
        </h2>
        <p>
          Each step in our scale is mathematically derived. This ensures that even when you change the base size from {baseSize}px to something else, the relationship between your H1 and your body text remains constant.
        </p>
      </div>
    </div>
  );

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <header style={{
        background: P.purple, padding: "10px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          <div style={{ background: P.cyan, color: P.navy, width: "32px", height: "32px", borderRadius: "6px", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900 }}>T</div>
          <div>
            <div style={{ fontWeight: 800, color: P.white, fontSize: "1rem", lineHeight: 1 }}>TypScale Pro</div>
            <div style={{ fontSize: "0.6rem", color: P.light }}>Design Lady</div>
          </div>
        </div>
        
        <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
          <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: "6px", padding: "3px", display: "flex", gap: "2px" }}>
            {["scale", "article", "css"].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding: "4px 12px", borderRadius: "4px", border: "none", cursor: "pointer", fontSize: "0.7rem", fontWeight: 600,
                background: tab === t ? P.cyan : "transparent", color: tab === t ? P.navy : P.white, transition: "0.2s"
              }}>{t.toUpperCase()}</button>
            ))}
          </div>
          <div style={{ height: "20px", width: "1px", background: "rgba(255,255,255,0.2)" }} />
          <button onClick={() => setDevice(device === "desktop" ? "mobile" : "desktop")} style={{
            background: "none", border: "1px solid rgba(255,255,255,0.3)", color: P.white, padding: "4px 10px", borderRadius: "6px", fontSize: "0.7rem", cursor: "pointer"
          }}>
            {device === "desktop" ? "Desktop" : "Mobile"}
          </button>
          <button onClick={() => setDarkMode(!darkMode)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.1rem" }}>{darkMode ? "☀️" : "🌙"}</button>
        </div>
      </header>

      {/* Main Content */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <Sidebar />
        <main style={{ flex: 1, overflowY: "auto", background: bg, transition: "background 0.3s" }}>
          {loading && (
            <div style={{ position: "absolute", top: "60px", right: "20px", zIndex: 10 }}>
              <Badge text="Connecting to Google Fonts..." color={P.cyan} bg={P.purple} />
            </div>
          )}
          {tab === "scale" && <ScaleTab />}
          {tab === "article" && <ArticleTab />}
          {tab === "css" && <CSSTab />}
        </main>
      </div>

      {/* Footer */}
      <footer style={{ background: "#060f26", borderTop: "1px solid #1a2a4a", padding: "6px 20px", display: "flex", justifyContent: "space-between", fontSize: "0.6rem", color: P.light }}>
        <span>TypScale Pro · Built for Jerlyn O'Donnell</span>
        <span>Dynamic Font Discovery · WCAG AA Ready</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TypScale />);
</script>
</body>
</html>
